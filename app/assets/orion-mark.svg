<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <rect width="200" height="200" fill="#080808" rx="24"/>

  <g transform="translate(100,100)">
    <!-- Main orbital arc — broken ring matching the photo -->
    <path d="M 0 -72 A 72 72 0 1 1 -51 -51" fill="none" stroke="#c8bfa0" stroke-width="3" stroke-linecap="round"/>
    <!-- Gap segment — dimmer -->
    <path d="M -51 -51 A 72 72 0 0 1 -20 -69" fill="none" stroke="#c8bfa0" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

    <!-- Orbital trail streaks -->
    <path d="M -90 30 Q -20 10 60 -60" fill="none" stroke="#9a9080" stroke-width="0.8" opacity="0.5"/>
    <path d="M -100 50 Q -30 20 55 -70" fill="none" stroke="#9a9080" stroke-width="0.5" opacity="0.3"/>

    <!-- Star nodes on trail -->
    <circle cx="-82" cy="38" r="2.5" fill="#d4c8a8" opacity="0.7"/>
    <circle cx="-60" cy="50" r="1.5" fill="#b8ae90" opacity="0.5"/>
    <circle cx="50" cy="-62" r="2" fill="#d4c8a8" opacity="0.6"/>

    <!-- Central star -->
    <circle cx="0" cy="0" r="8" fill="#f0ead8"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#e8dfc0" stroke-width="0.6" opacity="0.4"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#080808" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#080808" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Background stars -->
    <circle cx="40" cy="-55" r="1.2" fill="#b8b0a0" opacity="0.6"/>
    <circle cx="-35" cy="60" r="1" fill="#a0988a" opacity="0.5"/>
    <circle cx="65" cy="20" r="0.8" fill="#b8b0a0" opacity="0.4"/>
    <circle cx="-65" cy="-20" r="1" fill="#c8c0b0" opacity="0.5"/>
    <circle cx="20" cy="70" r="0.8" fill="#a8a098" opacity="0.4"/>
    <circle cx="-20" cy="-68" r="1.4" fill="#d0c8b8" opacity="0.55"/>
  </g>
</svg>
